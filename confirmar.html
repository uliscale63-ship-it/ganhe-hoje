<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOU ANGOLANO - Conhecimento vale Ouro</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">

<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    background-color: #000;
    color: #fff;
  }

  .opcao-deposito {
    cursor: pointer;
    border: 2px solid #222;
    padding: 20px;
    border-radius: 20px;
    background: #111;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .opcao-deposito.selecionado {
    border-color: #F8D308;
    background: rgba(248, 211, 8, 0.1);
  }

  .opcao-deposito input {
    display: none;
  }

  .w-5.h-5 {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #666;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .w-5.h-5 .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #F8D308;
    display: none;
  }

  .opcao-deposito.selecionado .dot {
    display: block;
  }
</style>
</head>
<body>

<div class="min-h-screen flex items-center justify-center p-6">
  <div class="glass-card p-12 rounded-[4rem] border-zinc-700 text-center shadow-2xl relative bg-zinc-900/50">
    <h2 class="text-4xl font-black text-white mb-10">DESAFIO CULTURAL</h2>
    <div id="quizSection" class="space-y-6 text-left">
      
      <!-- Pergunta 1 -->
      <div class="question p-6 rounded-2xl border border-zinc-800 space-y-3">
        <p class="text-lg font-black mb-4">1️⃣ Quem não ouve ________, ouve coitado.</p>
        <div class="grid grid-cols-1 gap-3">
          <label class="opcao-deposito">
            <input type="radio" name="q1" value="conselho">
            <div class="w-5 h-5"><div class="dot"></div></div>
            <span>conselho</span>
          </label>
          <label class="opcao-deposito">
            <input type="radio" name="q1" value="amigo">
            <div class="w-5 h-5"><div class="dot"></div></div>
            <span>amigo</span>
          </label>
          <label class="opcao-deposito">
            <input type="radio" name="q1" value="vizinho">
            <div class="w-5 h-5"><div class="dot"></div></div>
            <span>vizinho</span>
          </label>
        </div>
      </div>

      <!-- Pergunta 2 -->
      <div class="question p-6 rounded-2xl border border-zinc-800 space-y-3">
        <p class="text-lg font-black mb-4">2️⃣ A ________ faz a força.</p>
        <div class="grid grid-cols-1 gap-3">
          <label class="opcao-deposito">
            <input type="radio" name="q2" value="união">
            <div class="w-5 h-5"><div class="dot"></div></div>
            <span>união</span>
          </label>
          <label class="opcao-deposito">
            <input type="radio" name="q2" value="coragem">
            <div class="w-5 h-5"><div class="dot"></div></div>
            <span>coragem</span>
          </label>
          <label class="opcao-deposito">
            <input type="radio" name="q2" value="paciência">
            <div class="w-5 h-5"><div class="dot"></div></div>
            <span>paciência</span>
          </label>
        </div>
      </div>

      <!-- Pergunta 3 -->
      <div class="question p-6 rounded-2xl border border-zinc-800 space-y-3">
        <p class="text-lg font-black mb-4">3️⃣ Água mole em ________ dura, tanto bate até que fura.</p>
        <div class="grid grid-cols-1 gap-3">
          <label class="opcao-deposito">
            <input type="radio" name="q3" value="pedra">
            <div class="w-5 h-5"><div class="dot"></div></div>
            <span>pedra</span>
          </label>
          <label class="opcao-deposito">
            <input type="radio" name="q3" value="madeira">
            <div class="w-5 h-5"><div class="dot"></div></div>
            <span>madeira</span>
          </label>
          <label class="opcao-deposito">
            <input type="radio" name="q3" value="ferro">
            <div class="w-5 h-5"><div class="dot"></div></div>
            <span>ferro</span>
          </label>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // Torna opções clicáveis e visivelmente selecionadas
  const opcoes = document.querySelectorAll('.opcao-deposito');

  opcoes.forEach(opcao => {
    opcao.addEventListener('click', () => {
      const grupo = opcao.closest('.question');
      grupo.querySelectorAll('.opcao-deposito').forEach(o => o.classList.remove('selecionado'));
      opcao.classList.add('selecionado');
      opcao.querySelector('input').checked = true;
    });
  });
</script>

</body>
</html>
