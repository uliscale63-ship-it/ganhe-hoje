<style>

:root{
--angola-red:#E31B23;
--angola-yellow:#F8D308;
--angola-black:#000000;
--gold-gradient:linear-gradient(135deg,#F8D308 0%,#D4AF37 50%,#F8D308 100%);
}

body,html{
margin:0;
padding:0;
width:100%;
font-family:'Inter',sans-serif;
background:var(--angola-black);

}

.bg-angola-red{background:var(--angola-red);}
.text-angola-yellow{color:var(--angola-yellow);}
.border-angola-yellow{border-color:var(--angola-yellow);}

.glass-card{

backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

.gold-glow{
box-shadow:0 0 30px rgba(248,211,8,0.3);
border:2px solid var(--angola-yellow);
}

.btn-ganho{
background:var(--gold-gradient);
box-shadow:0 4px 15px rgba(248,211,8,0.4);
border-bottom:4px solid #b39700;
transition:all .1s;
}

.btn-ganho:active{
transform:translateY(2px);

.notificacao-ganhador{
animation:slideInRight .5s forwards;
